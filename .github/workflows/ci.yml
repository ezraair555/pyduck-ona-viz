name: CI

on:
  push:
    branches: [main, v*]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[all,dev]"
      - name: Lint with ruff
        run: python -m ruff check src tests
      - name: Format check with black
        run: python -m black --check src tests
      - name: Import order check with isort
        run: python -m isort --check src tests
      - name: Type check with mypy
        run: python -m mypy src/pyduck_ona_viz
      - name: Test with pytest
        run: |
          python -m pytest --cov=pyduck_ona_viz --cov-report=term --cov-fail-under=90 tests/
