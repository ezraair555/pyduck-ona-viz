repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: check-added-large-files
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: ["--fix"]
        files: "^(src|tests)/"

  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 24.4.2
    hooks:
      - id: black
        language_version: python3
        files: "^(src|tests)/"

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black"]
        files: "^(src|tests)/"

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies: [pandas-stubs, types-networkx]
        args: ["src/pyduck_ona_viz"]
        pass_filenames: false

  - repo: local
    hooks:
      - id: no-egg-info
        name: no-committed-egg-info
        entry: bash -c 'test ! -d src/pyduck_ona_viz.egg-info'
        language: system
        pass_filenames: false
        always_run: true
